                                { type: "paragraph", text: "También puedes crear el enlace de reseña manualmente: busca tu negocio en Google Maps, haz clic en 'Escribir una reseña' y copia la URL. Usa un acortador como bit.ly para hacerlo fácil de compartir. Este enlace es tu herramienta más valiosa para conseguir más opiniones de Google." },
                                { type: "heading", text: "El momento perfecto para pedir reseñas" },
                                { type: "paragraph", text: "El tiempo es crucial cuando estás buscando conseguir más reseñas. Pide la reseña justo después de completar un trabajo exitoso, cuando el cliente está más satisfecho. Los mejores momentos son: inmediatamente después de terminar el servicio, cuando el cliente expresa satisfacción, o tras gestionar la incidencia con éxito." },
                                { type: "paragraph", text: "No esperes días porque el entusiasmo se enfría. La tasa de respuesta cae un 50% después de 24 horas. Incorpora la petición de reseñas en tu proceso habitual de cierre de trabajo. Este es uno de los métodos que mejor ha funcionado para miles de negocios." },
                                { type: "heading", text: "Estrategias para pedir reseñas: Plantillas y métodos efectivos" },
                                { type: "paragraph", text: "Existen múltiples estrategias para pedir reseñas que han funcionado para miles de empresas. A continuación te presentamos las más efectivas con solicitudes personalizadas." },
                                { type: "heading", text: "Por WhatsApp o SMS (el método más efectivo)" },
                                { type: "paragraph", text: "Enviar solicitudes personalizadas por WhatsApp o SMS es el método que mejor resultado ha dado. Ejemplo de mensaje: 'Hola [nombre], me alegro de que hayan quedado satisfechos con el trabajo. Si tienes un momento, me ayuda mucho que dejes tu opinión en Google. Te dejo el enlace directo a reseñas: [enlace]. ¡Gracias!'" },
                                { type: "paragraph", text: "Personaliza siempre con el nombre del cliente. La tasa de respuesta por WhatsApp y SMS es mucho mayor que por correo electrónico." },
                                { type: "heading", text: "En persona: solicitudes personalizadas" },
                                { type: "paragraph", text: "'Me alegra que todo haya salido bien. Las opiniones de clientes satisfechos como tú me ayudan mucho a que otros me encuentren. ¿Te importaría dejarme una reseña en Google? Te envío el enlace ahora mismo.' Sea natural y sincero, no insistente. Si el cliente dice que sí, envía el enlace de reseña inmediatamente." },
                                { type: "heading", text: "Por correo electrónico" },
                                { type: "paragraph", text: "Asunto: 'Tu opinión nos ayuda a mejorar la experiencia'. Contenido: Breve agradecimiento, petición directa, enlace directo a reseñas visible, y firma profesional con datos del autor o equipo. Envíalo el mismo día o máximo 24 horas después del servicio." },
                                { type: "heading", text: "Tarjetas y stands NFC para conseguir reseñas" },
                                { type: "paragraph", text: "Las tarjetas y stands NFC son una de las herramientas para conseguir reseñas más innovadoras. El cliente solo tiene que acercar su móvil a la tarjeta NFC y automáticamente se abre la página para dejar su review. Es la forma más rápida de hacerlo fácil." },
                                { type: "paragraph", text: "Dónde colocar las tarjetas NFC: en el mostrador o centro de atención al cliente, junto a la caja registradora, en la mesa de trabajo al finalizar el servicio, en el vehículo de trabajo. Las tarjetas y stands NFC cuestan entre 15€ y 30€ y son una inversión con gran resultado." },
                                { type: "heading", text: "Usar códigos QR para conseguir más opiniones de Google" },
                                { type: "paragraph", text: "Los códigos QR son otro de los métodos efectivos para conseguir más reseñas. Genera un QR con tu enlace directo a reseñas usando herramientas gratuitas como qr-code-generator.com. El cliente solo tiene que escanear con su móvil." },
                                { type: "paragraph", text: "Ubicaciones estratégicas para el QR: tarjetas de visita, facturas y presupuestos, pegatinas en el vehículo de trabajo, carteles en tu local o centro de trabajo, tarjetas de agradecimiento." },
                                { type: "heading", text: "Herramientas para conseguir reseñas y software de gestión" },
                                { type: "paragraph", text: "El panel de control de Google My Business es gratuito e imprescindible para cualquier empresa. Te permite ver todas las reseñas de Google, responder a reseñas, y obtener estadísticas básicas. Activa las notificaciones para hacer seguimiento rápido a nuevas opiniones." },
                                { type: "paragraph", text: "Si estás buscando ir más allá, existen software especializados como Trustpilot, Podium o Birdeye. Estas plataformas con inteligencia artificial automatizan el envío de solicitudes personalizadas por correo y SMS, hacen seguimiento de respuestas, y te ayudan a administrar todas tus reseñas desde un centro único." },
                                { type: "heading", text: "Cómo responder a reseñas positivas" },
                                { type: "paragraph", text: "Responder a reseñas positivas es parte esencial de la gestión de reseñas. Agradece personalmente mencionando el nombre del cliente, haz referencia al trabajo realizado, y mantén un tono profesional pero cercano. Una respuesta de 2-3 líneas de contenido es suficiente." },
                                { type: "paragraph", text: "Ejemplo: 'Muchas gracias por tu opinión, [nombre]. Fue un placer ayudarte con [tipo de trabajo]. ¡Aquí estaremos siempre que nos necesites! - El equipo de [nombre empresa]'" },
                                { type: "heading", text: "Cómo responder a una reseña negativa" },
                                { type: "paragraph", text: "Una reseña negativa es inevitable, pero tu respuesta puede convertirla en una oportunidad para mejorar la experiencia de futuros clientes. Mantén la calma y espera unas horas antes de responder a reseñas negativas. Nunca discutas públicamente ni uses un tono defensivo." },
                                { type: "paragraph", text: "Estructura para responder: agradece el feedback y el comentario, discúlpate si corresponde, ofrece gestionar la incidencia de forma concreta, invita a continuar la consulta en privado." },
                                { type: "paragraph", text: "Ejemplo: 'Lamentamos que tu experiencia no haya sido la esperada. Nos gustaría entender qué ocurrió y gestionar la incidencia. ¿Podrías contactarnos al [teléfono] para hablarlo personalmente? Queremos mejorar la experiencia y que quedes satisfecho. - Equipo de atención al cliente'" },
                                { type: "heading", text: "Qué hacer con reseñas falsas o spam" },
                                { type: "paragraph", text: "Si recibes una reseña falsa (de alguien que no es cliente real) o spam, puedes reportarla desde tu panel de control. Haz clic en los tres puntos del comentario y selecciona 'Reportar review'. Google revisará si incumple sus políticas." },
                                { type: "paragraph", text: "Mientras tanto, responde profesionalmente indicando que no tienes registro de ese cliente. Esto muestra a otros usuarios que la reseña puede no ser legítima. Google tarda entre 3 días y 3 semanas en revisar los reportes." },
                                { type: "heading", text: "Errores que debes evitar al pedir reseñas" },
                                { type: "paragraph", text: "Nunca compres reseñas falsas: Google las detecta y puede penalizar o eliminar tu Perfil de Google. Los clientes también detectan patrones sospechosos y pierdes credibilidad. El riesgo no compensa." },
                                { type: "paragraph", text: "No ofrezcas descuentos a cambio de reseñas: va contra las políticas de Google My Business. Puedes agradecer después de recibir una reseña, pero no condicionarla. Tampoco pidas reseñas solo a clientes que sabes que están satisfechos selectivamente." },
                                { type: "heading", text: "Frecuencia ideal de nuevas reseñas para aumentar visibilidad" },
                                { type: "paragraph", text: "Google valora un flujo constante más que picos puntuales. Lo ideal es conseguir más reseñas de forma regular: entre 2 y 5 nuevas al mes para un pequeño negocio. Esto demuestra actividad continua y clientes satisfechos." },
                                { type: "paragraph", text: "Si tienes muchos clientes satisfechos pero pocas reseñas de Google, empieza pidiendo a los más recientes. No bombardees a todos a la vez, distribuye las solicitudes personalizadas para mantener un flujo natural y aumentar la visibilidad de tu negocio de forma sostenida." },
                                { type: "conclusion", text: "Conseguir más reseñas en Google es un trabajo constante, no una acción puntual. La gestión de reseñas es una de las estrategias de marketing digital más rentables para cualquier empresa. Cada reseña positiva es un comercial ayudando a atraer más clientes las 24 horas del día. Con los consejos para conseguir más reseñas de esta guía, puedes pasar de tener pocas opiniones a convertirte en el negocio mejor valorado de tu zona." }
                            ],
                            faq: [
                                { q: "¿Cuántas reseñas necesito para aumentar mi visibilidad en Google?", a: "No hay un número mágico, pero intenta superar a tu competencia local. En general, 20-30 reseñas de Google con puntuación superior a 4 estrellas ya te posicionan bien en el Local Pack. Lo imprescindible es mantener un flujo constante de nuevas opiniones para aumentar la visibilidad de tu negocio." },
                                { q: "¿Puedo comprar reseñas en Google My Business?", a: "No, está prohibido por Google y pueden penalizar o eliminar tu Perfil de Google. Además, la gente detecta las reseñas falsas y pierdes credibilidad. Solo reseñas reales de clientes satisfechos funcionan a largo plazo." },
                                { q: "¿Cómo responder a una reseña negativa sin empeorar la situación?", a: "Mantén la calma, agradece el comentario, discúlpate si corresponde, ofrece gestionar la incidencia de forma concreta y propón continuar la consulta en privado. Nunca discutas públicamente. Tu respuesta la leen otros clientes potenciales que están buscando más información." },
                                { q: "¿Cómo creo el enlace directo a reseñas para mis clientes?", a: "Desde tu panel de control de Google My Business, ve a Inicio > Solicitar reseñas y copia el enlace de reseña corto. También puedes buscar tu negocio en Google Maps, clic en 'Escribir review' y copiar la URL. Usa un acortador como bit.ly para hacerlo fácil de compartir." },
                                { q: "¿Cuál es el mejor momento para pedir una reseña?", a: "Justo después de completar un trabajo exitoso, cuando el cliente expresa satisfacción. La tasa de respuesta cae un 50% después de 24 horas. Pide la reseña en persona, por WhatsApp, SMS o correo el mismo día del servicio." },
                                { q: "¿Puedo ofrecer descuentos a cambio de reseñas de Google?", a: "No, va contra las políticas de Google My Business. Puedes agradecer a un cliente después de que deje una reseña, pero no puedes condicionar descuentos o regalos. Google puede penalizar tu Perfil de Google si detecta esta práctica." },
                                { q: "¿Cómo elimino una reseña falsa o de spam?", a: "Reporta el comentario desde tu panel de control: haz clic en los tres puntos de la reseña y selecciona 'Reportar review'. Google revisará si incumple sus políticas en 3 días a 3 semanas. Mientras tanto, responde profesionalmente indicando que no tienes registro de ese cliente." },
                                { q: "¿Las reseñas antiguas siguen siendo útiles para el SEO?", a: "Sí, pero Google da más peso a las reseñas recientes. Un flujo constante de nuevas opiniones (2-5 al mes) indica que tu empresa está activa. Las reseñas de hace más de 1 año tienen menos impacto en el resultado de SEO local." },
                                { q: "¿Debo responder a todas las reseñas o solo a las negativas?", a: "Responde a todas. Las respuestas a reseñas positivas muestran que valoras la atención al cliente y animan a otros clientes que dejen opiniones. Las respuestas a negativas demuestran profesionalidad. Google también valora la interacción activa para el SEO." },
                                { q: "¿Cómo uso tarjetas y stands NFC para conseguir reseñas?", a: "Las tarjetas y stands NFC son herramientas para conseguir reseñas muy efectivas. Colócalas en tu centro de atención al cliente o mostrador. El cliente solo acerca su móvil y se abre automáticamente la página para dejar su review. Es la forma más rápida de hacerlo fácil." },
                                { q: "¿Qué hago si un cliente satisfecho no quiere dejar reseña?", a: "Respeta su decisión, no insistas. Alguna gente valora su privacidad. Hacerlo fácil con enlace directo a reseñas, tarjetas NFC o QR ayuda, pero no presiones. Céntrate en los clientes que sí están dispuestos a ayudarte." },
                                { q: "¿Las reseñas de Google afectan a mi posicionamiento en Maps?", a: "Sí, las reseñas de Google son uno de los factores más imprescindibles para el SEO en Google Maps y el Local Pack. Cantidad, calidad y frecuencia de nuevas reseñas influyen directamente en la visibilidad de tu negocio local." },
                                { q: "¿Puedo pedir reseñas por WhatsApp, SMS o correo electrónico?", a: "Sí, enviar solicitudes personalizadas por WhatsApp, SMS o correo es muy efectivo. Incluye el nombre del cliente, agradece el trabajo realizado e incluye el enlace directo a reseñas. WhatsApp y SMS tienen mayor tasa de apertura que el correo electrónico." },
                                { q: "¿Cuánto tiempo tardan las reseñas en aparecer publicadas?", a: "Las reseñas suelen aparecer inmediatamente o en pocas horas. En algunos casos, Google puede retenerlas para revisión hasta 24-48 horas. Si una reseña no aparece después de 3 días, puede haber sido filtrada por los sistemas de Google." },
                                { q: "¿Qué software de gestión de reseñas recomiendas?", a: "Para la mayoría de pequeños negocios, el panel de control gratuito de Google My Business es suficiente. Si buscas automatización, plataformas con inteligencia artificial como Trustpilot, Podium o Birdeye ayudan a administrar solicitudes personalizadas, hacer seguimiento y responder a reseñas desde un centro único." }

                            faq: [
                                { q: "¿WhatsApp Business es gratis?", a: "Sí, WhatsApp Business es completamente gratis para autónomos y pequeñas empresas. Puedes descargarla desde Google Play o App Store sin ningún coste. Todas las funciones profesionales (perfil de empresa, catálogo, mensajes automáticos, etiquetas, estadísticas) están incluidas. Solo existe una versión de pago llamada WhatsApp Business API, diseñada para grandes empresas con alto volumen de mensajes que necesitan integraciones avanzadas con CRM." },
                                { q: "¿Para qué sirve WhatsApp Business?", a: "WhatsApp Business es una herramienta de comunicación profesional diseñada para negocios. Sirve para: mostrar información de tu empresa (dirección, horarios, web, descripción), crear un catálogo de productos o servicios con fotos y precios, enviar mensajes automáticos de bienvenida y ausencia, usar respuestas rápidas para contestar preguntas frecuentes en segundos, organizar clientes con etiquetas de colores (nuevo, pendiente, pagado...), y analizar estadísticas de mensajes enviados y leídos. Es ideal para autónomos que quieren profesionalizar su comunicación con clientes." },
                                { q: "¿Cuáles son las diferencias con WhatsApp normal?", a: "Las principales diferencias son: Perfil de empresa con dirección, horario, email y web (WhatsApp normal solo tiene nombre y foto). Catálogo de productos para mostrar hasta 500 artículos con foto, precio y descripción. Mensajes automáticos de bienvenida cuando te escriben por primera vez y de ausencia fuera de horario. Respuestas rápidas con atajos de teclado para responder preguntas frecuentes. Etiquetas para organizar conversaciones por categorías. Estadísticas de mensajes enviados, entregados y leídos. La interfaz es prácticamente idéntica, así que la transición es muy fácil." },
                                { q: "¿Puedo usar dos números?", a: "Sí, puedes tener WhatsApp normal y WhatsApp Business instalados simultáneamente en el mismo teléfono, cada uno con un número diferente. Esto es ideal para separar tu vida personal de la profesional. También puedes usar WhatsApp Business con tu número actual y migrar todos tus chats. Si tu móvil tiene Dual SIM, puedes aprovechar ambas líneas. Otra opción es usar WhatsApp Web o la app de escritorio para gestionar tu cuenta Business desde el ordenador mientras usas WhatsApp normal en el móvil." },
                                { q: "¿Cómo crear un catálogo?", a: "Para crear tu catálogo: Ve a Ajustes > Herramientas para la empresa > Catálogo. Pulsa 'Añadir artículo' y completa: foto del producto (puedes añadir hasta 10 fotos por artículo), nombre, precio (opcional), descripción, enlace a tu web, y código del producto. Puedes añadir hasta 500 productos. Los clientes verán tu catálogo desde tu perfil y podrán preguntar directamente sobre cualquier artículo. Es como tener una mini tienda online dentro de WhatsApp. Actualiza regularmente los precios y disponibilidad para mantenerlo útil." },
                                { q: "¿Cómo configurar mensajes automáticos?", a: "WhatsApp Business ofrece tres tipos de mensajes automáticos: 1) Mensaje de bienvenida: se envía automáticamente cuando un cliente te escribe por primera vez o después de 14 días de inactividad. Ideal para presentarte y dar información básica. 2) Mensaje de ausencia: se activa fuera de tu horario comercial o cuando estás de vacaciones. Informa que responderás pronto. 3) Respuestas rápidas: atajos que empiezan con '/' para responder preguntas frecuentes (precios, horarios, ubicación). Para configurarlos: Ajustes > Herramientas para la empresa > selecciona el tipo de mensaje, actívalo y personaliza el texto." },
                                { q: "¿Cómo usar en el ordenador?", a: "Tienes dos opciones para usar WhatsApp Business en el ordenador: 1) WhatsApp Web: accede a web.whatsapp.com desde cualquier navegador, abre WhatsApp Business en tu móvil, ve a Ajustes > Dispositivos vinculados > Vincular dispositivo, y escanea el código QR. 2) Aplicación de escritorio: descarga la app oficial desde whatsapp.com/download para Windows o Mac. Ambas opciones sincronizan todos tus chats y te permiten escribir más rápido con el teclado. Puedes tener hasta 4 dispositivos vinculados simultáneamente. El móvil ya no necesita estar conectado a internet para usar la versión de escritorio." },
                                { q: "¿Pierdo mis chats al cambiar?", a: "No, si migras desde WhatsApp normal a WhatsApp Business con el mismo número de teléfono, todos tus chats, fotos, vídeos y archivos se transfieren automáticamente. El proceso es muy sencillo: instala WhatsApp Business, introduce tu número, verifica con el código SMS, y la app detectará tu copia de seguridad existente. También puedes hacer una copia de seguridad manual antes del cambio (Ajustes > Chats > Copia de seguridad) para mayor tranquilidad. Tus contactos ni siquiera notarán el cambio, seguirán viéndote con el mismo número." },
                                { q: "¿Vale la pena usar WhatsApp Business?", a: "Absolutamente sí, especialmente para autónomos. Las ventajas son claras: proyectas una imagen más profesional con perfil de empresa completo, ahorras tiempo con mensajes automáticos y respuestas rápidas, muestras tus productos o servicios con el catálogo integrado, organizas mejor tus clientes con etiquetas, y todo esto es 100% gratis. La configuración inicial toma menos de 15 minutos y los beneficios son inmediatos. Más del 80% de los consumidores prefieren contactar con negocios por WhatsApp que por teléfono. Si eres autónomo y aún no usas WhatsApp Business, estás perdiendo oportunidades de venta." }

                                { type: "heading", text: "Como crear tu codigo JSON-LD paso a paso" },

                                { type: "conclusion", text: "Implementar Schema LocalBusiness en tu web es una de las acciones de SEO local con mejor relacion esfuerzo-resultado. En menos de 10 minutos puedes darle a Google toda la informacion que necesita sobre tu negocio, mejorar tu visibilidad en los resultados de busqueda y conseguir mas clics que tu competencia." }

                                { type: "paragraph", text: "Els inconvenients són preus molt elevats per a autònoms i xicotetes empreses, temps de lliurament llargs (setmanes o mesos de desenvolupament), manteniment i hosting a banda (50-200€/mes addicionals), dependència total de l'agència per a qualsevol canvi, i pressupostos que poden créixer durant el projecte." },
                                { type: "heading", text: "Dissenyadors freelance: 500€ - 1.200€" },
                                { type: "paragraph", text: "Contractar un dissenyador web freelance pot ser més econòmica que una agència, amb preus entre 500€ i 1.200€ per a una web corporativa. Alguns professionals amb menys experiència ofereixen webs des de 800€, mentre que els més experimentats poden cobrar fins a 3.000€." },
                                { type: "paragraph", text: "Els avantatges són que és més econòmica que una agència de disseny, tracte directe i personal amb el professional, major flexibilitat en el disseny de la pàgina, temps de lliurament més curts, i fàcil comunicació i seguiment del projecte." },
                                { type: "paragraph", text: "Els inconvenients inclouen qualitat molt variable depenent del dissenyador, hosting i domini web a banda (50-100€/any), risc que el freelance desaparega o no estiga disponible, manteniment complicat a llarg termini, i que no sempre dominen SEO ni màrqueting digital." },
                                { type: "heading", text: "Plataformes DIY: 10€ - 30€/mes" },
                                { type: "paragraph", text: "Wix, Squarespace o WordPress.com són ferramentes que et permeten crear una pàgina web tu mateix amb editors visuals. Els plans van des de 10€ fins a 30€ al mes. La idea és que pugues dissenyar i desenvolupar una web sense coneixements tècnics." },
                                { type: "paragraph", text: "Els avantatges són preu mensual assequible si ja tens temps, control total sobre el teu lloc web, podràs fer canvis quan vulgues, no depens de ningú per a actualitzacions simples, i moltes plantilles gratuïtes disponibles." },
                                { type: "paragraph", text: "Els inconvenients són que requereix temps i corba d'aprenentatge, resultat poc professional sense experiència en disseny, SEO limitat en plans bàsics, frustració si no domines les ferramentes, i el cost total augmenta amb plugins premium." },
                                { type: "heading", text: "Costos ocults que has de conéixer" },
                                { type: "paragraph", text: "Molts pressupostos de disseny web no inclouen totes les despeses necessàries per a mantindre el teu lloc web funcionant. El domini web .es costa entre 8€ i 20€/any, el .com entre 10€ i 15€ a l'any. El servei d'hosting varia: bàsic compartit 60€/any, qualitat mitjana 100-150€/any, premium 200-500€/any." },
                                { type: "paragraph", text: "El manteniment inclou actualitzacions de seguretat i plugins, còpies de seguretat periòdiques de dades, certificat SSL (gratuït o fins a 100€/any), i suport tècnic variable. Una web amb disseny de 800€ pot acabar costant més de 1.000€ el primer any si sumes tot." },
                                { type: "heading", text: "La nostra proposta: 15€/mes tot inclòs" },
                                { type: "paragraph", text: "En WebAutonomos oferim webs professionals per només 15€/mes amb una tarifa plana sense sorpreses. És l'alternativa ideal per als autònoms i xicotetes empreses a Espanya que volen presència digital professional sense grans inversions." },
                                { type: "paragraph", text: "Inclou disseny de la teua pàgina web professional i responsive, servei d'hosting d'alta velocitat, domini .es inclòs el primer any, certificat SSL per a seguretat, manteniment, actualitzacions i còpies de seguretat, suport tècnic per email i WhatsApp, optimització SEO bàsica per a motors de cerca, i formulari de contacte funcional." },
                                { type: "paragraph", text: "Avantatges addicionals: sense pagament inicial (no pagues res fins a veure la teua web), sense permanència (cancel·la quan vulgues), web llesta en 48-72h amb lliurament ràpid garantit, mètode Déjà-Fait (podràs veure una demo abans de decidir), i més de 50 clients satisfets." },
                                { type: "heading", text: "Comparativa detallada d'opcions" },
                                { type: "paragraph", text: "Perquè pugues comparar fàcilment: Agències cobren 1.000€-6.000€ inicial + 50-200€/mes manteniment. Freelancers cobren 500€-1.200€ inicial + 50-100€/any hosting. DIY costa 10-30€/mes + temps invertit. WebAutonomos costa 15€/mes tot inclòs sense pagament inicial." },
                                { type: "heading", text: "Quina opció triar segons el teu cas?" },
                                { type: "paragraph", text: "Tria una agència de disseny si la teua empresa té un pressupost alt per a màrqueting digital, necessites funcionalitats molt específiques o integracions complexes, vols un branding i disseny completament únic, o vas a llançar una botiga online amb milers de productes." },
                                { type: "paragraph", text: "Tria un dissenyador freelance si tens un pressupost mitjà (500-1.200€), temps per a buscar i gestionar al dissenyador, no t'importa gestionar hosting i domini per separat, o coneixes a un professional de confiança." },
                                { type: "paragraph", text: "Tria DIY si tens temps lliure i t'agrada aprendre ferramentes noves, no et frustres fàcilment amb la tecnologia, el teu objectiu és una web personal o blog simple, o gaudeixes del procés de dissenyar tu mateix." },
                                { type: "paragraph", text: "Tria WebAutonomos si eres autònom o tens una xicoteta empresa, vols una web professional ràpid i sense complicacions, prefereixes un preu fix mensual sense sorpreses ni despeses extra, no vols preocupar-te per aspectes tècnics, o valores el suport i manteniment inclòs." },
                                { type: "heading", text: "Com començar el teu projecte web" },
                                { type: "paragraph", text: "Pas 1: Defineix el teu objectiu. Què vols aconseguir amb el teu lloc web? Vendre productes? Mostrar els teus serveis? Captar clients amb un formulari?" },
                                { type: "paragraph", text: "Pas 2: Prepara el contingut. Recopila els textos, imatges i dades del teu negoci. Pensa en les seccions que necessites: inici, serveis, sobre nosaltres, contacte." },
                                { type: "paragraph", text: "Pas 3: Tria el teu proveïdor basant-te en esta guia. Si vols més informació sobre el nostre servei, pots contactar-nos sense compromís." },
                                { type: "paragraph", text: "Pas 4: Llança i promociona. Una vegada disponible la teua web, donar-se d'alta en Google Business Profile, compartir en xarxes socials, i optimitzar per a motors de cerca perquè siga Google qui t'envie clients." },
                                { type: "conclusion", text: "No deixes que el pressupost t'impedisca tindre presència online. Hi ha opcions per a tots els butxaques, des d'agències de disseny per a projectes complexos fins a la nostra tarifa plana de 15€/mes per a autònoms. L'important és donar el pas i començar a captar clients en el món digital. Amb una web senzilla i professional pots créixer i competir amb empreses molt més grans." }
                            ],
                            faq: [
                                { q: "Quant costa crear una pàgina web bàsica per a autònoms?", a: "El cost mitjà d'una web bàsica per a autònoms varia considerablement: agències de disseny cobren entre 1.000€ i 6.000€, dissenyadors freelance entre 500€ i 1.200€, i serveis de tarifa plana com WebAutonomos ofereixen webs completes Només 15€/mes sense pagament inicial." },
                                { q: "Per què hi ha tanta diferència en els preus de disseny web?", a: "Els preus de disseny web varien depenent de diversos factors: tipus de pàgina web, disseny personalitzat o plantilla, funcionalitats com integracions i plugins, nivell de personalització, i serveis addicionals com hosting, domini i manteniment. En WebAutonomos simplifiquem tot amb la nostra filosofia 'Un preu. Tot inclòs': 15€/mes amb web, hosting, domini, SSL, manteniment i modificacions." },
                                { q: "Què inclou el preu d'una pàgina web?", a: "Depén del proveïdor. Sempre pregunta si inclou servei d'hosting, domini web, SSL, manteniment, còpies de seguretat i suport tècnic. En WebAutonomos incloem tot per 15€/mes." },
                                { q: "Val la pena pagar més per un disseny web personalitzat?", a: "Només si tens necessitats específiques com botiga online complexa, integracions personalitzades o branding molt específic. Per a la majoria d'autònoms i pimes, una web senzilla i professional amb plantilla optimitzada és suficient." },
                                { q: "Quant costa el domini i hosting d'una web?", a: "Un domini web .es costa entre 8€ i 20€/any. El servei d'hosting varia entre 60€ i 200€ a l'any. En WebAutonomos, el domini .es del primer any i l'hosting estan inclosos en els 15€/mes." },
                                { q: "Quin tipus de pàgina web necessita un autònom?", a: "La majoria de treballadors autònoms necessiten una web bàsica amb estes seccions: inici, serveis, sobre mi, i contacte amb formulari. Si vens productes, necessitaràs una botiga online. En WebAutonomos ens encarreguem de crear exactament el que necessites per 15€/mes, incloent modificacions il·limitades per a adaptar la teua web a mesura que creix el teu negoci." },
                                { q: "Quant de temps es tarda a crear una pàgina web?", a: "El temps de desenvolupament varia: agències tarden 2-8 setmanes, freelancers 1-4 setmanes, i en WebAutonomos lliurem la teua web en 24 hores amb el nostre mètode Déjà-Fait." },
                                { q: "És millor usar una plantilla o un disseny personalitzat?", a: "Per a la majoria de casos, una plantilla professional optimitzada és l'opció més pràctica i econòmica. El disseny personalitzat només val la pena si la teua empresa necessita un branding molt específic." },
                                { q: "Què és una web responsive i per què és important?", a: "Una web responsive s'adapta automàticament a qualsevol dispositiu. És fonamental perquè més del 60% d'usuaris naveguen des del mòbil, i Google penalitza les webs no responsive. Totes les webs que creem en WebAutonomos són 100% responsive i optimitzades per a mòbil, inclòs en el preu." },
                                { q: "Necessite donar-me d'alta com a autònom per a tindre una web?", a: "No necessites donar-te d'alta només per a tindre una web personal. No obstant això, si vas a vendre productes o serveis, sí necessites estar donat d'alta a Espanya." },
                                { q: "Quines despeses addicionals té una pàgina web?", a: "Les despeses típiques: renovació de domini (10-20€/any), hosting (60-200€/any), plugins premium. Amb la nostra tarifa plana de 15€/mes, tot està inclòs." },
                                { q: "Com puc fer que la meua web aparega en Google?", a: "Per a aparéixer en motors de cerca necessites: contingut amb paraules clau rellevants, web ràpida i responsive, optimització SEO. També és important donar-se d'alta en Google Search Console. En WebAutonomos incloem SEO local en el nostre servei de 15€/mes, i també oferim gestió de Google My Business perquè aparegues en Google Maps." },
                                { q: "Què passa si cancel·le la meua web de lloguer?", a: "Si cancel·les, simplement deixes de pagar i la web es desactiva. No hi ha penalitzacions ni permanència. És una solució flexible per als autònoms." },
                                { q: "Puc connectar la meua web amb xarxes socials?", a: "Sí, totes les nostres webs inclouen enllaços a xarxes socials (Instagram, Facebook, LinkedIn...). Les integracions avançades estan incloses en el nostre servei de modificacions, sense cost addicional. Només has de demanar-ho." },
                                { q: "La meua web tindrà correu electrònic professional?", a: "Un correu electrònic professional (@elteudomain.es) transmet confiança. En WebAutonomos configurem el teu correu professional com a part del servei de creació del teu lloc web, en els 15€/mes. No pagues res extra." }

                        {
                            id: 5,
                            slug: "como-conseguir-resenas-google-negocio",
                            title: "Com aconseguir més ressenyes en Google per al teu negoci: Guia completa 2026",
                            seoTitle: "Com Aconseguir Més Ressenyes en Google My Business | 15 Estratègies 2026",
                            metaDescription: "Descobreix les millors estratègies per a demanar ressenyes i aconseguir més opinions de Google. Enllaç directe a ressenyes, targetes NFC, sol·licituds personalitzades i gestió de ressenyes.",
                            keywords: ["aconseguir més ressenyes", "ressenyes de google", "més opinions de google", "consells per a aconseguir més ressenyes", "estratègies per a demanar ressenyes", "ferramentes per a aconseguir ressenyes", "plataforma amb intel·ligència artificial", "enllaç directe a ressenyes", "targetes i stands NFC", "sol·licituds personalitzades", "ressenyes positives", "gestió de ressenyes", "clients satisfets", "demanar ressenyes", "fer-ho fàcil", "perfil de google", "google my business", "enllaç de ressenya", "panell de control", "ressenya negativa", "respondre a ressenyes", "gestionar la incidència", "millorar l'experiència", "atenció al client", "atraure més clients", "visibilitat del teu negoci", "estratègies de màrqueting digital", "SEO local"],
                            excerpt: "Les ressenyes de Google són or per al teu negoci. Descobreix estratègies ètiques, plantilles de missatges, targetes NFC i com crear el teu enllaç directe per a aconseguir més opinions positives.",
                            category: "gmb",
                            date: "20 Des 2025",
                            readTime: 12,
                            image: "⭐",
                            content: [
                                { type: "intro", text: "Les ressenyes de Google són el factor més imprescindible perquè nous clients et trien. Una empresa amb 50 ressenyes de 4.5 estrelles sempre guanyarà al negoci que té 5 ressenyes, encara que siguen de 5 estrelles. En esta guia completa hem recopilat els millors consells per a aconseguir més ressenyes de forma ètica i efectiva per a augmentar la visibilitat del teu negoci." },
                                { type: "paragraph", text: "El 88% de la gent confia tant en les ressenyes de Google com en les recomanacions personals. Per als autònoms i xicotets negocis, aconseguir més opinions de Google és la millor estratègia de màrqueting digital que existeix. Cada ressenya positiva és un client potencial que et tria front a la competència, ajudant a atraure més clients a la teua empresa." },
                                { type: "heading", text: "Per què les ressenyes de Google són imprescindibles per a la teua empresa" },
                                { type: "paragraph", text: "Google utilitza les ressenyes com a factor clau de posicionament SEO en el Local Pack (els 3 resultats amb mapa). Més ressenyes positives significa millor resultat en els motors de cerca locals. A més, una bona valoració augmenta el CTR en el teu Perfil de Google o Google My Business." },
                                { type: "paragraph", text: "Les dades parlen per si soles: el 93% de la gent llig ressenyes abans d'elegir un producte o servei, el 72% no actua fins a llegir opinions positives, i els negocis amb més de 4 estrelles reben un 12% més de clics. Les ressenyes de Google són el centre de la teua presència digital." },
                                { type: "heading", text: "Com funciona l'algoritme de ressenyes de Google" },
                                { type: "paragraph", text: "Google valora tres aspectes principals: quantitat (més és millor), qualitat (puntuació mitjana alta), i freqüència (ressenyes recents pesen més). Un flux constant de noves opinions indica que la teua empresa està activa i els clients satisfets continuen deixant review." },
                                { type: "paragraph", text: "També importa el contingut de les ressenyes. Les opinions detallades amb paraules clau rellevants (electricista, fontaner, servei ràpid...) ajuden Google a entendre el teu negoci i mostrar-te en cerques més específiques, millorant el teu resultat en el SEO local." },
                                { type: "heading", text: "Com crear el teu enllaç directe a ressenyes" },
                                { type: "paragraph", text: "El primer pas per a aconseguir més ressenyes és fer-ho fàcil als teus clients. Crea un enllaç directe a ressenyes que porte a la gent directament a la pàgina de valoracions del teu negoci. Des del teu panell de control de Google My Business, ves a Inici > Sol·licitar ressenyes i copia l'enllaç de ressenya curt." },
                                { type: "heading", text: "Configura i verifica el teu perfil de Google" },
                                { type: "paragraph", text: "Abans de demanar ressenyes, assegura't que el teu Perfil de Google estiga complet. Configura i verifica el teu perfil amb tota la informació de la teua empresa: horaris, adreça, telèfon, fotos i descripció de serveis. Un perfil complet genera més confiança i els clients que deixen opinions trobaran més fàcil el teu negoci." },
                                { type: "paragraph", text: "També pots crear l'enllaç de ressenya manualment: busca el teu negoci en Google Maps, fes clic en 'Escriure una ressenya' i copia la URL. Usa un escurçador com bit.ly per a fer-ho fàcil de compartir. Este enllaç és la teua ferramenta més valuosa per a aconseguir més opinions de Google." },
                                { type: "heading", text: "El moment perfecte per a demanar ressenyes" },
                                { type: "paragraph", text: "El temps és crucial quan estàs buscant aconseguir més ressenyes. Demana la ressenya just després de completar un treball exitós, quan el client està més satisfet. Els millors moments són: immediatament després de terminar el servei, quan el client expressa satisfacció, o després de gestionar la incidència amb èxit." },
                                { type: "paragraph", text: "No esperes dies perquè l'entusiasme es refreda. La taxa de resposta cau un 50% després de 24 hores. Incorpora la petició de ressenyes en el teu procés habitual de tancament de treball. Este és un dels mètodes que millor ha funcionat per a milers de negocis." },
                                { type: "heading", text: "Estratègies per a demanar ressenyes: Plantilles i mètodes efectius" },
                                { type: "paragraph", text: "Existeixen múltiples estratègies per a demanar ressenyes que han funcionat per a milers d'empreses. A continuació et presentem les més efectives amb sol·licituds personalitzades." },
                                { type: "heading", text: "Per WhatsApp o SMS (el mètode més efectiu)" },
                                { type: "paragraph", text: "Enviar sol·licituds personalitzades per WhatsApp o SMS és el mètode que millor resultat ha donat. Exemple de missatge: 'Hola [nom], m'alegre que hagen quedat satisfets amb el treball. Si tens un moment, m'ajuda molt que deixes la teua opinió en Google. Et deixe l'enllaç directe a ressenyes: [enllaç]. Gràcies!'" },
                                { type: "paragraph", text: "Personalitza sempre amb el nom del client. La taxa de resposta per WhatsApp i SMS és molt major que per correu electrònic." },
                                { type: "heading", text: "En persona: sol·licituds personalitzades" },
                                { type: "paragraph", text: "'M'alegra que tot haja eixit bé. Les opinions de clients satisfets com tu m'ajuden molt perquè altres em troben. T'importaria deixar-me una ressenya en Google? T'envie l'enllaç ara mateix.' Sigues natural i sincer, no insistent. Si el client diu que sí, envia l'enllaç de ressenya immediatament." },
                                { type: "heading", text: "Per correu electrònic" },
                                { type: "paragraph", text: "Assumpte: 'La teua opinió ens ajuda a millorar l'experiència'. Contingut: Breu agraïment, petició directa, enllaç directe a ressenyes visible, i signatura professional amb dades de l'autor o equip. Envia'l el mateix dia o màxim 24 hores després del servei." },
                                { type: "heading", text: "Targetes i stands NFC per a aconseguir ressenyes" },
                                { type: "paragraph", text: "Les targetes i stands NFC són una de les ferramentes per a aconseguir ressenyes més innovadores. El client només ha d'acostar el seu mòbil a la targeta NFC i automàticament s'obri la pàgina per a deixar la seua review. És la forma més ràpida de fer-ho fàcil." },
                                { type: "paragraph", text: "On col·locar les targetes NFC: en el mostrador o centre d'atenció al client, junt a la caixa registradora, en la mesa de treball en finalitzar el servei, en el vehicle de treball. Les targetes i stands NFC costen entre 15€ i 30€ i són una inversió amb gran resultat." },
                                { type: "heading", text: "Usar codis QR per a aconseguir més opinions de Google" },
                                { type: "paragraph", text: "Els codis QR són un altre dels mètodes efectius per a aconseguir més ressenyes. Genera un QR amb el teu enllaç directe a ressenyes usant ferramentes gratuïtes com qr-code-generator.com. El client només ha d'escanejar amb el seu mòbil." },
                                { type: "paragraph", text: "Ubicacions estratègiques per al QR: targetes de visita, factures i pressupostos, adhesius en el vehicle de treball, cartells en el teu local o centre de treball, targetes d'agraïment." },
                                { type: "heading", text: "Ferramentes per a aconseguir ressenyes i software de gestió" },
                                { type: "paragraph", text: "El panell de control de Google My Business és gratuït i imprescindible per a qualsevol empresa. Et permet veure totes les ressenyes de Google, respondre a ressenyes, i obtenir estadístiques bàsiques. Activa les notificacions per a fer seguiment ràpid a noves opinions." },
                                { type: "paragraph", text: "Si estàs buscant anar més enllà, existeixen software especialitzats com Trustpilot, Podium o Birdeye. Estes plataformes amb intel·ligència artificial automatitzen l'enviament de sol·licituds personalitzades per correu i SMS, fan seguiment de respostes, i t'ajuden a administrar totes les teues ressenyes des d'un centre únic." },
                                { type: "heading", text: "Com respondre a ressenyes positives" },
                                { type: "paragraph", text: "Respondre a ressenyes positives és part essencial de la gestió de ressenyes. Agraeix personalment mencionant el nom del client, fes referència al treball realitzat, i manté un to professional però proper. Una resposta de 2-3 línies de contingut és suficient." },
                                { type: "paragraph", text: "Exemple: 'Moltes gràcies per la teua opinió, [nom]. Va ser un plaer ajudar-te amb [tipus de treball]. Ací estarem sempre que ens necessites! - L'equip de [nom empresa]'" },
                                { type: "heading", text: "Com respondre a una ressenya negativa" },
                                { type: "paragraph", text: "Una ressenya negativa és inevitable, però la teua resposta pot convertir-la en una oportunitat per a millorar l'experiència de futurs clients. Manté la calma i espera unes hores abans de respondre a ressenyes negatives. Mai discutisques públicament ni uses un to defensiu." },
                                { type: "paragraph", text: "Estructura per a respondre: agraeix el feedback i el comentari, discúlpat si correspon, ofereix gestionar la incidència de forma concreta, invita a continuar la consulta en privat." },
                                { type: "paragraph", text: "Exemple: 'Lamentem que la teua experiència no haja sigut l'esperada. Ens agradaria entendre què va ocórrer i gestionar la incidència. Podries contactar-nos al [telèfon] per a parlar-ho personalment? Volem millorar l'experiència i que quedes satisfet. - Equip d'atenció al client'" },
                                { type: "heading", text: "Què fer amb ressenyes falses o spam" },
                                { type: "paragraph", text: "Si reps una ressenya falsa (d'algú que no és client real) o spam, pots reportar-la des del teu panell de control. Fes clic en els tres punts del comentari i selecciona 'Reportar review'. Google revisarà si incompleix les seues polítiques." },
                                { type: "paragraph", text: "Mentrestant, respon professionalment indicant que no tens registre d'eixe client. Açò mostra a altres usuaris que la ressenya pot no ser legítima. Google tarda entre 3 dies i 3 setmanes a revisar els reportes." },
                                { type: "heading", text: "Errors que has d'evitar en demanar ressenyes" },
                                { type: "paragraph", text: "Mai compres ressenyes falses: Google les detecta i pot penalitzar o eliminar el teu Perfil de Google. Els clients també detecten patrons sospitosos i perds credibilitat. El risc no compensa." },
                                { type: "paragraph", text: "No oferisques descomptes a canvi de ressenyes: va contra les polítiques de Google My Business. Pots agrair després de rebre una ressenya, però no condicionar-la. Tampoc demanes ressenyes només a clients que saps que estan satisfets selectivament." },
                                { type: "heading", text: "Freqüència ideal de noves ressenyes per a augmentar visibilitat" },

                            metaDescription: "Discover the best strategies to ask for reviews and get more Google reviews. Direct review link, NFC cards, personalized requests and review management.",
                            keywords: ["get more reviews", "google reviews", "more google reviews", "tips to get more reviews", "strategies to ask for reviews", "tools to get reviews", "AI platform", "direct review link", "NFC cards and stands", "personalized requests", "positive reviews", "review management", "satisfied customers", "ask for reviews", "make it easy", "google profile", "google my business", "review link", "dashboard", "negative review", "respond to reviews", "handle the issue", "improve the experience", "customer service", "attract more customers", "business visibility", "digital marketing strategies", "local SEO"],

                            category: "gmb",

                            image: "⭐",
                            content: [
                                { type: "intro", text: "Google reviews are the most essential factor for new customers to choose you. A business with 50 reviews at 4.5 stars will always beat the business with 5 reviews, even if they're 5 stars. In this complete guide we've compiled the best tips to get more reviews ethically and effectively to increase your business visibility." },
                                { type: "paragraph", text: "88% of people trust Google reviews as much as personal recommendations. For freelancers and small businesses, getting more Google reviews is the best digital marketing strategy that exists. Each positive review is a potential customer choosing you over the competition, helping to attract more customers to your company." },
                                { type: "heading", text: "Why Google reviews are essential for your business" },
                                { type: "paragraph", text: "Google uses reviews as a key ranking factor for local SEO in the Local Pack (the 3 results with map). More positive reviews means better results in local search engines. Additionally, a good rating increases CTR on your Google Profile or Google My Business." },
                                { type: "paragraph", text: "The data speaks for itself: 93% of people read reviews before choosing a product or service, 72% don't act until reading positive reviews, and businesses with more than 4 stars receive 12% more clicks. Google reviews are the center of your digital presence." },
                                { type: "heading", text: "How Google's review algorithm works" },
                                { type: "paragraph", text: "Google values three main aspects: quantity (more is better), quality (high average score), and frequency (recent reviews weigh more). A constant flow of new reviews indicates that your company is active and satisfied customers continue leaving reviews." },
                                { type: "paragraph", text: "The content of reviews also matters. Detailed reviews with relevant keywords (electrician, plumber, fast service...) help Google understand your business and show you in more specific searches, improving your local SEO results." },
                                { type: "heading", text: "How to create your direct review link" },
                                { type: "paragraph", text: "The first step to get more reviews is to make it easy for your customers. Create a direct review link that takes people directly to your business's rating page. From your Google My Business dashboard, go to Home > Request reviews and copy the short review link." },
                                { type: "heading", text: "Set up and verify your Google profile" },
                                { type: "paragraph", text: "Before asking for reviews, make sure your Google Profile is complete. Set up and verify your profile with all your company information: hours, address, phone, photos and service description. A complete profile generates more trust and customers who leave reviews will find your business more easily." },
                                { type: "paragraph", text: "You can also create the review link manually: search for your business on Google Maps, click 'Write a review' and copy the URL. Use a shortener like bit.ly to make it easy to share. This link is your most valuable tool for getting more Google reviews." },
                                { type: "heading", text: "The perfect time to ask for reviews" },
                                { type: "paragraph", text: "Timing is crucial when you're looking to get more reviews. Ask for the review right after completing a successful job, when the customer is most satisfied. The best moments are: immediately after finishing the service, when the customer expresses satisfaction, or after successfully handling an issue." },
                                { type: "paragraph", text: "Don't wait days because enthusiasm cools down. Response rate drops 50% after 24 hours. Incorporate review requests into your regular job closing process. This is one of the methods that has worked best for thousands of businesses." },
                                { type: "heading", text: "Strategies to ask for reviews: Templates and effective methods" },
                                { type: "paragraph", text: "There are multiple strategies to ask for reviews that have worked for thousands of companies. Below we present the most effective ones with personalized requests." },
                                { type: "heading", text: "Via WhatsApp or SMS (the most effective method)" },
                                { type: "paragraph", text: "Sending personalized requests via WhatsApp or SMS is the method that has given the best results. Example message: 'Hi [name], I'm glad you were satisfied with the work. If you have a moment, it would really help me if you left your review on Google. Here's the direct review link: [link]. Thanks!'" },
                                { type: "paragraph", text: "Always personalize with the customer's name. Response rate via WhatsApp and SMS is much higher than via email." },
                                { type: "heading", text: "In person: personalized requests" },
                                { type: "paragraph", text: "'I'm glad everything went well. Reviews from satisfied customers like you really help others find me. Would you mind leaving me a Google review? I'll send you the link right now.' Be natural and sincere, not pushy. If the customer says yes, send the review link immediately." },
                                { type: "heading", text: "Via email" },
                                { type: "paragraph", text: "Subject: 'Your feedback helps us improve the experience'. Content: Brief thanks, direct request, visible direct review link, and professional signature with author or team details. Send it the same day or maximum 24 hours after the service." },
                                { type: "heading", text: "NFC cards and stands to get reviews" },
                                { type: "paragraph", text: "NFC cards and stands are one of the most innovative tools to get reviews. The customer just needs to bring their phone close to the NFC card and the review page automatically opens. It's the fastest way to make it easy." },
                                { type: "paragraph", text: "Where to place NFC cards: at the counter or customer service center, next to the cash register, on the work table when finishing the service, in the work vehicle. NFC cards and stands cost between €15 and €30 and are an investment with great results." },
                                { type: "heading", text: "Using QR codes to get more Google reviews" },
                                { type: "paragraph", text: "QR codes are another effective method to get more reviews. Generate a QR with your direct review link using free tools like qr-code-generator.com. The customer just needs to scan with their phone." },
                                { type: "paragraph", text: "Strategic locations for the QR: business cards, invoices and quotes, stickers on the work vehicle, posters in your premises or work center, thank you cards." },
                                { type: "heading", text: "Tools to get reviews and management software" },
                                { type: "paragraph", text: "The Google My Business dashboard is free and essential for any business. It allows you to see all Google reviews, respond to reviews, and get basic statistics. Enable notifications for quick follow-up on new reviews." },
                                { type: "paragraph", text: "If you're looking to go further, there are specialized software like Trustpilot, Podium or Birdeye. These AI platforms automate sending personalized requests via email and SMS, track responses, and help you manage all your reviews from a single center." },
                                { type: "heading", text: "How to respond to positive reviews" },
                                { type: "paragraph", text: "Responding to positive reviews is an essential part of review management. Thank them personally mentioning the customer's name, reference the work done, and maintain a professional but friendly tone. A 2-3 line response is enough." },
                                { type: "paragraph", text: "Example: 'Thank you so much for your review, [name]. It was a pleasure helping you with [type of work]. We'll be here whenever you need us! - The [company name] team'" },
                                { type: "heading", text: "How to respond to a negative review" },
                                { type: "paragraph", text: "A negative review is inevitable, but your response can turn it into an opportunity to improve the experience for future customers. Stay calm and wait a few hours before responding to negative reviews. Never argue publicly or use a defensive tone." },
                                { type: "paragraph", text: "Structure for responding: thank them for the feedback and comment, apologize if appropriate, offer to handle the issue concretely, invite them to continue the conversation privately." },

                                { type: "heading", text: "What to do with fake or spam reviews" },
                                { type: "paragraph", text: "If you receive a fake review (from someone who isn't a real customer) or spam, you can report it from your dashboard. Click the three dots on the comment and select 'Report review'. Google will review whether it violates their policies." },
                                { type: "paragraph", text: "Meanwhile, respond professionally indicating you have no record of that customer. This shows other users the review may not be legitimate. Google takes between 3 days and 3 weeks to review reports." },
                                { type: "heading", text: "Mistakes you should avoid when asking for reviews" },
                                { type: "paragraph", text: "Never buy fake reviews: Google detects them and can penalize or remove your Google Profile. Customers also detect suspicious patterns and you lose credibility. The risk isn't worth it." },
                                { type: "paragraph", text: "Don't offer discounts in exchange for reviews: it goes against Google My Business policies. You can thank after receiving a review, but don't make it conditional. Also don't selectively ask for reviews only from customers you know are satisfied." },

                                { type: "paragraph", text: "Google values a constant flow more than occasional spikes. The ideal is to get more reviews regularly: between 2 and 5 new ones per month for a small business. This demonstrates continuous activity and satisfied customers." },
                                { type: "paragraph", text: "If you have many satisfied customers but few Google reviews, start by asking the most recent ones. Don't bombard everyone at once, distribute personalized requests to maintain a natural flow and increase your business visibility sustainably." },
                                { type: "conclusion", text: "Getting more Google reviews is constant work, not a one-time action. Review management is one of the most profitable digital marketing strategies for any business. Each positive review is a commercial helping to attract more customers 24 hours a day. With the tips to get more reviews from this guide, you can go from having few reviews to becoming the best-rated business in your area." }

                                { q: "How do I remove a fake or spam review?", a: "Report the comment from your dashboard: click the three dots on the review and select 'Report review'. Google will review if it violates their policies in 3 days to 3 weeks. Meanwhile, respond professionally indicating you have no record of that customer." },
                                { q: "Are old reviews still useful for SEO?", a: "Yes, but Google gives more weight to recent reviews. A constant flow of new reviews (2-5 per month) indicates your business is active. Reviews from more than 1 year ago have less impact on local SEO results." },

                                { q: "How do I use NFC cards and stands to get reviews?", a: "NFC cards and stands are very effective tools to get reviews. Place them at your customer service center or counter. The customer just brings their phone close and the review page automatically opens. It's the fastest way to make it easy." },

                                { type: "paragraph", text: "The best performing content types are: service plus location pages, blog articles with local questions like 'how much does a renovation cost in Valencia in 2026', case studies with completed work, and practical guides. The key is choosing the right keywords for each piece of content and making everything 100% original." },

                                { type: "heading", text: "How to build your contact list from scratch" },
                                { type: "paragraph", text: "As a freelancer, you already have more contacts than you think. Gather your existing customers from invoices and WhatsApp, get GDPR consent, add a subscription form on your website offering something in return, and capture emails at every interaction (quotes, invoices, conversations). Your list will grow naturally over time." },
                                { type: "heading", text: "What to send: 6 types of emails that work for freelancers" },
                                { type: "paragraph", text: "The 6 most effective email types are: an automatic welcome email (up to 80% open rate), a monthly newsletter with tips and promotions, a seasonal reminder email, a post-job email requesting a Google review, a special offer email with a deadline, and a referral email asking customers to recommend you in exchange for a discount." },
                                { type: "heading", text: "How to write emails that get opened and drive action" },

                            ],

                            metaDescription: "A negative review is not the end. Learn to respond professionally and turn criticism into opportunities.",
                            keywords: ["respond negative Google reviews", "manage negative reviews", "bad Google reviews", "reply Google complaints"],

                            category: "gmb",
                            date: "Mar 26, 2026",
                            readTime: 10,
                            image: "⭐",
                            content: [
                                { type: "intro", text: "You have just opened Google and there it is: a 1-star review on your business listing. Your stomach sinks. Every day, thousands of freelancers in Valencia, Alicante, Elda and Elche face negative Google reviews. The good news is that a bad review does not have to be the end of the world. In fact, if you know how to respond to negative Google reviews professionally, you can turn a crisis into an opportunity to demonstrate the quality of your service." },
                                { type: "heading", text: "Why negative reviews are not as bad as you think" },
                                { type: "paragraph", text: "A Northwestern University study found that consumers trust businesses rated 4.2 to 4.5 stars more than those with a perfect 5.0. A perfect score looks fake. Moreover, 89% of consumers read the business owner's responses to negative reviews. When they see you respond with professionalism and empathy, their trust in your business increases." },
                                { type: "heading", text: "5 mistakes to avoid when responding to negative reviews" },
                                { type: "paragraph", text: "Never respond in the heat of the moment -- wait at least 2 hours. Do not deny the problem or blame the customer. Avoid generic copy-paste replies. Do not ignore the review, as Google reports that businesses that respond get 35% more clicks. And never offer compensation publicly, as that invites more fake negative reviews." },
                                { type: "heading", text: "Templates for responding to every type of negative review" },
                                { type: "paragraph", text: "Each type of review requires a different approach. For an unsatisfied customer: thank them, express regret and offer to resolve it privately. For price complaints: explain the value of your service. For fake reviews: state you cannot find matching records and ask them to get in touch. For text-less reviews: invite them to share details. Always personalise with the customer's name and reference the specific service." },
                                { type: "heading", text: "How to turn a complaint into a loyal customer" },
                                { type: "paragraph", text: "A customer who complains and receives a good response becomes more loyal than one who never had any problems. This is called the service recovery paradox. The process: respond publicly, contact privately, solve the problem with a concrete solution, follow up in 2-3 days and ask them to update their review." },
                                { type: "heading", text: "Preventive strategy: get more positive reviews" },
                                { type: "paragraph", text: "The best defence against bad reviews is having so many positive ones that a negative review barely affects your average rating. Ask for reviews at the right moment, make the process easy with a direct link, use a QR code sign in your premises, and never buy fake reviews. Google detects suspicious patterns and can penalise your business listing." },
                                { type: "conclusion", text: "A well-managed negative review can be your best marketing tool. Future customers who read your professional response will trust you more than a competitor with no track record of conflict resolution. Always respond, resolve when possible, and build a base of positive reviews that dilutes any criticism." }
                            ],
                            faq: [
                                { q: "Can you delete a negative Google review?", a: "You can only request removal if the review violates Google's policies: fake content, spam, offensive language, conflict of interest or irrelevant content. Legitimate reviews from unhappy customers cannot be deleted, but you can respond professionally." },
                                { q: "How long do I have to respond to a negative review?", a: "Ideally, respond within the first 24 to 48 hours. A quick response shows you care about your customers. The faster you respond, the more likely the customer is to modify or remove their review if you resolve the issue." },
                                { q: "Do negative reviews affect Google Maps ranking?", a: "Yes, but less than you might think. Google values your average rating and the total number of reviews. A business with 4.3 stars and 80 reviews ranks better than one with 5.0 and only 3 reviews. What hurts most is having no reviews or not responding to the ones you have." },
                                { q: "Can I ask a customer to change their negative review?", a: "Yes, but tactfully. First resolve the customer's issue genuinely. Then you can suggest they update their review if their experience has improved. Never pressure them or offer compensation in exchange, as that violates Google's policies." },
                                { q: "How many positive reviews do I need to offset a negative one?", a: "As a general rule, you need between 10 and 20 five-star reviews to offset the impact of a 1-star review on your average rating. But more important than the number is consistency: a steady flow of recent positive reviews carries more weight." }

                            metaDescription: "Schema structured data helps Google understand your business. We explain how to implement it without being a programmer.",
                            keywords: ["Schema LocalBusiness", "structured data business", "JSON-LD local business", "schema markup"],
                            excerpt: "Schema LocalBusiness is invisible structured data that tells Google exactly who you are, where you are and what you offer. We explain how to implement it without writing a single line of code.",
                            category: "seo",
                            date: "Mar 30, 2026",
                            readTime: 10,
                            image: "📊",
                            content: [
                                { type: "intro", text: "If you have a local business in Spain's Comunidad Valenciana and want Google to understand perfectly who you are, where you are and what you offer, you need to know about Schema LocalBusiness. It is invisible structured data that tells Google in its own language everything about your business. Your customers never see it, but it makes the difference between appearing as a plain result on Google or standing out with opening hours, location, ratings and more." },
                                { type: "heading", text: "What is Schema LocalBusiness and how does it work" },
                                { type: "paragraph", text: "Schema LocalBusiness is a standardised vocabulary created by Schema.org, a joint project of Google, Bing, Yahoo and Yandex, that allows search engines to understand your website as if it were a database. The recommended way to implement it is through JSON-LD (JavaScript Object Notation for Linked Data), a format Google prefers because it is inserted as an independent block within the HTML, separate from visible content." },
                                { type: "heading", text: "Benefits of structured data for your local business" },
                                { type: "paragraph", text: "When Google detects valid structured data on your website, it can display rich snippets with star ratings, opening hours, address and price range. These results receive between 20% and 30% more clicks. Schema also improves Google's understanding of your business and strengthens the consistency of your NAP data (Name, Address, Phone) across your entire online presence." },
                                { type: "heading", text: "How to create your JSON-LD code step by step" },
                                { type: "paragraph", text: "You do not need to be a programmer. A basic Schema LocalBusiness includes: specific business type (Plumber, Electrician, Dentist), exact name, description including your city, full address, GPS coordinates, opening hours, service area and price range. You can use free generators like Merkle's tool to create the code without errors." },
                                { type: "heading", text: "How to implement Schema on your website without being a programmer" },
                                { type: "paragraph", text: "If your website is static HTML, paste the JSON-LD block just before the closing head tag. If you use WordPress, install Rank Math or Yoast SEO which have a dedicated structured data section. If you use Wix or Squarespace, add the code in the custom code section of the header. The process takes less than 5 minutes." },
                                { type: "heading", text: "Common Schema mistakes and how to validate your code" },
                                { type: "paragraph", text: "The most frequent errors are: incorrect or fabricated data, using the generic type instead of a specific one, wrong GPS coordinates, phone number without international format, and duplicating Schema across multiple pages. Validate your code with Google's Rich Results Test and the Schema Markup Validator to make sure everything is correct." },
                                { type: "conclusion", text: "Implementing Schema LocalBusiness on your website is one of the local SEO actions with the best effort-to-result ratio. In less than 10 minutes you can give Google all the information it needs about your business, improve your visibility in search results and get more clicks than your competitors." }
                            ],
                            faq: [
                                { q: "What is Schema LocalBusiness in simple terms?", a: "Schema LocalBusiness is invisible code you add to your website to tell Google exactly what your business is, where it is located, what hours it operates and what services it offers. Think of it as a technical data sheet that search engines can read and understand perfectly." },
                                { q: "Does Schema improve my Google ranking?", a: "Schema is not a direct ranking factor, but it does improve your visibility indirectly. Structured data allows Google to display rich snippets showing your hours, location and ratings. These results receive between 20% and 30% more clicks than standard listings." },
                                { q: "Do I need to know how to code to implement Schema?", a: "Not necessarily. There are free online generators like Merkle's or TechnicalSEO.com where you fill in a form and they generate the JSON-LD code ready to copy and paste. If you use WordPress, plugins like Rank Math or Yoast SEO let you add Schema without touching code." },
                                { q: "What is the difference between Schema LocalBusiness and Google Business Profile?", a: "Google Business Profile is your listing on Google Maps, visible to all users. Schema LocalBusiness is code within your website that helps Google understand your business. They are complementary, not substitutes. Having both properly configured strengthens your local presence." },
                                { q: "How do I know if my website already has Schema LocalBusiness?", a: "You can check using Google's free Rich Results Test tool. Enter your website URL and it will show you what structured data it detects. You can also view your website's source code and look for LocalBusiness within script tags of type application/ld+json." }
                            ]

                                { type: "heading", text: "How to calculate the ROI of your digital marketing" },
                                { type: "paragraph", text: "The formula is simple: ROI = (Revenue generated - Marketing cost) / Marketing cost x 100. Example: Carlos, a painter in Valencia, invests 59 euros per month and gets 4 jobs with an average profit of 300 euros each. His ROI is 1,933%. That means for every euro invested he gets back nearly 20 euros. This level of ROI is common among well-positioned local service businesses." },

                                { type: "conclusion", text: "Digital marketing for freelancers is not an expense -- it is the most profitable investment you can make. With just 44 euros per month (website plus Google Business) you can generate a steady stream of new clients. Start with the basics, measure results and scale up when the data tells you to. Your competitors are already doing it." }

                                { q: "What percentage of my revenue should I spend on marketing?", a: "The general recommendation is between 5% and 10% of gross revenue for established businesses, and up to 15-20% for new businesses that need visibility. But for a local freelancer, what matters most is calculating how many new clients you need and how much it costs to acquire each one." },

                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsRevealed(true);
                            observer.unobserve(entry.target);
                        }
                    },
                    { threshold: 0.1, rootMargin: '0px 0px -50px 0px' }
                );
                
                if (ref.current) {
                    observer.observe(ref.current);
                }
                
                return () => {
                    if (ref.current) {
                        observer.unobserve(ref.current);
                    }
                };
            }, []);
            
            return { ref, isRevealed };
        };

            const relatedArticles = t.blog.articles
