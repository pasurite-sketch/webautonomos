                .slice(0, 2);
            
            // Extract headings for table of contents
            const headings = article?.content?.filter(block => block.type === 'heading') || [];
            
            // Scroll to heading function
            const scrollToHeading = (index) => {
                const headingElements = document.querySelectorAll('.article-heading');
                if (headingElements[index]) {
                    headingElements[index].scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            };
            
            // Schema.org structured data and SEO meta tags
            React.useEffect(() => {
                if (!article) return;
                
                // Store original title to restore on unmount
                const originalTitle = document.title;
                
                // Update document title
                document.title = article.seoTitle || article.title + ' | WebAutonomos';
                
                // Remove any existing dynamic meta tags
                document.querySelectorAll('meta[data-dynamic="true"]').forEach(el => el.remove());
                document.querySelectorAll('script[data-schema="article"]').forEach(el => el.remove());
                
                // Add meta description
                if (article.metaDescription) {
                    const metaDesc = document.createElement('meta');
                    metaDesc.name = 'description';
                    metaDesc.content = article.metaDescription;
                    metaDesc.setAttribute('data-dynamic', 'true');
                    document.head.appendChild(metaDesc);
                }
                
                // Add meta keywords
                if (article.keywords && article.keywords.length > 0) {
                    const metaKeywords = document.createElement('meta');
                    metaKeywords.name = 'keywords';
                    metaKeywords.content = article.keywords.join(', ');
                    metaKeywords.setAttribute('data-dynamic', 'true');
                    document.head.appendChild(metaKeywords);
                }
                
                // Add Open Graph tags
                const ogTags = [
                    { property: 'og:title', content: article.seoTitle || article.title },
                    { property: 'og:description', content: article.metaDescription || article.excerpt },
                    { property: 'og:type', content: 'article' },
                    { property: 'og:url', content: `https://webautonomos.es/blog/${article.slug}` },
                    { property: 'og:site_name', content: 'WebAutonomos' },
                    { property: 'og:locale', content: lang === 'es' ? 'es_ES' : lang === 'val' ? 'ca_ES' : 'en_US' },
                    { name: 'twitter:card', content: 'summary_large_image' },
                    { name: 'twitter:title', content: article.seoTitle || article.title },
                    { name: 'twitter:description', content: article.metaDescription || article.excerpt }
                ];
                
                ogTags.forEach(tag => {
                    const meta = document.createElement('meta');
                    if (tag.property) meta.setAttribute('property', tag.property);
                    if (tag.name) meta.name = tag.name;
                    meta.content = tag.content;
                    meta.setAttribute('data-dynamic', 'true');
                    document.head.appendChild(meta);
                });
                
                // Add canonical URL
                const canonical = document.createElement('link');
                canonical.rel = 'canonical';
                canonical.href = `https://webautonomos.es/blog/${article.slug}`;
                canonical.setAttribute('data-dynamic', 'true');
                document.head.appendChild(canonical);
                
                // Get article body text
                const articleBody = article.content
                    ?.filter(b => b.type === 'paragraph' || b.type === 'intro' || b.type === 'conclusion')
                    .map(b => b.text)
                    .join(' ') || '';
                
                // Parse date for ISO format

        // Cookie Banner
        const CookieBanner = ({ onOpenCookiesPolicy }) => {
            const { t } = useLanguage();
            const [isVisible, setIsVisible] = React.useState(false);

            const [preferences, setPreferences] = React.useState({

            React.useEffect(() => {
                const consent = localStorage.getItem('cookieConsent');
                if (!consent) {
                    // Petit délai pour une meilleure UX
                    setTimeout(() => setIsVisible(true), 1000);
                }
            }, []);
            
            const saveConsent = (type) => {
                const consentData = {
                    type: type,
                    preferences: preferences,
                    timestamp: new Date().toISOString()
                };
                localStorage.setItem('cookieConsent', JSON.stringify(consentData));
                setIsVisible(false);
                
                // Ici on pourrait activer/désactiver Google Analytics selon les préférences
                if (type === 'all' || preferences.analytics) {
                    // Activer Google Analytics
                    console.log('Analytics cookies accepted');
                }
            };
            
            const handleAcceptAll = () => {
                setPreferences({ essential: true, analytics: true, preferences: true });
                saveConsent('all');
            };
            
            const handleRejectNonEssential = () => {
                setPreferences({ essential: true, analytics: false, preferences: false });
                saveConsent('essential');
            };
            
            const handleSavePreferences = () => {
                saveConsent('custom');
                setShowCustomize(false);

            if (!isVisible) return null;
            
            return (

        // Footer

        // Legal/Privacy/Cookies Modal (Generic)
        const PolicyModal = ({ isOpen, onClose, pageData }) => {

        // URL Routing utilities
        const getPageFromUrl = () => {
            const path = window.location.pathname;
            if (path === '/' || path === '') return 'home';
            if (path === '/blog' || path === '/blog/') return 'blog';
            if (path.startsWith('/blog/')) {
                const slug = path.split('/blog/')[1];
                if (slug) return `article-${slug}`;
            }
            if (path === '/servicios' || path === '/services') return 'services';
            if (path === '/precios' || path === '/pricing') return 'pricing';
            if (path === '/como-funciona' || path === '/how') return 'how';
            if (path === '/contacto' || path === '/contact') return 'contact';
            if (path === '/demo-electricista') return 'demo-electricista';
            if (path === '/demo-fontanero') return 'demo-fontanero';
            return 'home';
        };

        const getUrlFromPage = (page) => {
            if (page === 'home') return '/';
            if (page === 'blog') return '/blog';
            if (page.startsWith('article-')) return `/blog/${page.replace('article-', '')}`;
            if (page === 'services') return '/servicios';
            if (page === 'pricing') return '/precios';
            if (page === 'how') return '/como-funciona';
            if (page === 'contact') return '/contacto';
            if (page === 'demo-electricista') return '/demo-electricista';
            if (page === 'demo-fontanero') return '/demo-fontanero';
            return '/';
        };

        // App
        function App() {
            const [lang, setLang] = useState('es');
            const [currentPage, setCurrentPageState] = useState(getPageFromUrl());
            const [showLegalModal, setShowLegalModal] = useState(false);
            const [showPrivacyModal, setShowPrivacyModal] = useState(false);
            const [showCookiesModal, setShowCookiesModal] = useState(false);
            const t = translations[lang];

            // SEO: Update meta tags based on current page and language
            React.useEffect(() => {
                const updateMetaTags = () => {
                    // Map page names to SEO keys
                    const pageToSeoKey = {
                        'home': 'home',
                        'services': 'services',
                        'pricing': 'pricing',
                        'how': 'how',
                        'blog': 'blog',
                        'contact': 'contact'
                    };
                    
                    // Get SEO data for current page (skip for articles - they have their own SEO)
                    const seoKey = pageToSeoKey[currentPage];
                    if (seoKey && t.seo && t.seo[seoKey]) {
                        const seoData = t.seo[seoKey];
                        
                        // Update title
                        document.title = seoData.title;
                        
                        // Update meta description
                        let metaDescription = document.querySelector('meta[name="description"]');
                        if (!metaDescription) {
                            metaDescription = document.createElement('meta');
                            metaDescription.setAttribute('name', 'description');
                            document.head.appendChild(metaDescription);
                        }
                        metaDescription.setAttribute('content', seoData.description);
                        
                        // Update Open Graph tags
                        let ogTitle = document.querySelector('meta[property="og:title"]');
                        if (!ogTitle) {
                            ogTitle = document.createElement('meta');
                            ogTitle.setAttribute('property', 'og:title');
                            document.head.appendChild(ogTitle);
                        }
                        ogTitle.setAttribute('content', seoData.title);
                        
                        let ogDescription = document.querySelector('meta[property="og:description"]');
                        if (!ogDescription) {
                            ogDescription = document.createElement('meta');
                            ogDescription.setAttribute('property', 'og:description');
                            document.head.appendChild(ogDescription);
                        }
                        ogDescription.setAttribute('content', seoData.description);
                    }
                };
                
                updateMetaTags();
                var langMap = { es: 'es', val: 'ca', en: 'en' };
                document.documentElement.lang = langMap[lang] || 'es';
                var localeMap = { es: 'es_ES', val: 'ca_ES', en: 'en_US' };
                var ogLocale = document.querySelector('meta[property="og:locale"]');
                if (!ogLocale) { ogLocale = document.createElement('meta'); ogLocale.setAttribute('property', 'og:locale'); document.head.appendChild(ogLocale); }
                ogLocale.setAttribute('content', localeMap[lang] || 'es_ES');
            }, [currentPage, lang, t]);

            // Custom setCurrentPage that also updates URL
            const setCurrentPage = (page) => {
                const url = getUrlFromPage(page);
                window.history.pushState({ page }, '', url);
                setCurrentPageState(page);
                window.scrollTo(0, 0);
            };

            // Handle browser back/forward buttons
            React.useEffect(() => {
                const handlePopState = (event) => {
                    if (event.state && event.state.page) {
                        setCurrentPageState(event.state.page);
                    } else {
                        setCurrentPageState(getPageFromUrl());
                    }
                    window.scrollTo(0, 0);
                };
                window.addEventListener('popstate', handlePopState);
                
                // Set initial state
                window.history.replaceState({ page: currentPage }, '', getUrlFromPage(currentPage));
                
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            return (
                <LanguageContext.Provider value={{ t, lang, setLang }}>
                    <div className="min-h-screen bg-white">
                        <Navigation currentPage={currentPage} setCurrentPage={setCurrentPage} />
                        {currentPage === 'home' && (
                            <>
                                <HeroSection setCurrentPage={setCurrentPage} />
                                <VideoSection />
                                <BenefitsSection />
                                <ComparisonSection />
                                <ForWhoSection setCurrentPage={setCurrentPage} />
                                <HowItWorksSection />
                                <PricingSection setCurrentPage={setCurrentPage} />
                                <TestimonialsSection />
                                <FAQSection />
                                <CTASection setCurrentPage={setCurrentPage} />
                            </>
                        )}
                        {currentPage === 'services' && <ServicesPage setCurrentPage={setCurrentPage} />}
                        {currentPage === 'pricing' && (<><div className="pt-20" /><PricingSection setCurrentPage={setCurrentPage} /><TestimonialsSection /></>)}
                        {currentPage === 'how' && (<><div className="pt-20" /><HowItWorksSection /><CTASection setCurrentPage={setCurrentPage} /></>)}
                        {currentPage === 'blog' && <BlogPage setCurrentPage={setCurrentPage} />}
                        {currentPage.startsWith('article-') && <ArticlePage articleSlug={currentPage.replace('article-', '')} setCurrentPage={setCurrentPage} />}
                        {currentPage === 'demo-electricista' && <DemoElectricista setCurrentPage={setCurrentPage} />}
                        {currentPage === 'demo-fontanero' && <DemoFontanero setCurrentPage={setCurrentPage} />}
                        {currentPage === 'contact' && <ContactPage />}
                        <Footer 
                            onOpenLegal={() => setShowLegalModal(true)} 
                            onOpenPrivacy={() => setShowPrivacyModal(true)}
                            onOpenCookies={() => setShowCookiesModal(true)}
                        />
                        <PolicyModal isOpen={showLegalModal} onClose={() => setShowLegalModal(false)} pageData={t.legalPage} />
                        <PolicyModal isOpen={showPrivacyModal} onClose={() => setShowPrivacyModal(false)} pageData={t.privacyPage} />
                        <PolicyModal isOpen={showCookiesModal} onClose={() => setShowCookiesModal(false)} pageData={t.cookiesPage} />
                        <CookieBanner onOpenCookiesPolicy={() => setShowCookiesModal(true)} />
                    </div>
                </LanguageContext.Provider>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    
    <!-- Floating Contact Buttons (Phone + WhatsApp) -->
